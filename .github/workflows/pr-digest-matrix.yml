name: PR Digest — Matrix (weekly)

on:
  schedule:
    # 09:00 UTC, Monday only. Edit this line to change the time or frequency.
    # Cron syntax: 'minute hour day-of-month month day-of-week'
    #   '0 9 * * 1'      09:00 UTC every Monday
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab for testing.

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run weekly digest
        env:
          # POST_TARGET=matrix switches the script to the Matrix
          # post backend and adds the "Merged this week" fetch.
          # DRY_RUN=1 prints the digest to the Actions log instead
          # of posting. INCLUDE_STALE=0 hides the Stale/dead bucket
          # (and its Org summary line). MERGED_WINDOW controls how
          # far back merged PRs are fetched, in days.
          POST_TARGET: matrix
          DRY_RUN: 1
          INCLUDE_STALE: 0
          INCLUDE_NEEDS_ATTENTION: 1
          MERGED_WINDOW: 7
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MATRIX_HOMESERVER: ${{ secrets.MATRIX_HOMESERVER }}
          MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}
          REPOS_FILE: ${{ github.workspace }}/repos.yaml
        run: python scripts/pr_digest.py
