name: PR Digest — Bots (bi-weekly)

on:
  schedule:
    # 09:00 UTC on the 1st and 15th of every month. Edit this line to
    # change the schedule or frequency.
    # Cron syntax: 'minute hour day-of-month month day-of-week'
    - cron: '0 9 1,15 * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab for testing.

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run bot digest
        env:
          # Bi-weekly digest of bot-authored PRs only.
          # INCLUDE_ONLY_BOTS keeps only dependabot/renovate/etc PRs;
          # INCLUDE_MERGED adds merged bot PRs over the last 14 days;
          # INCLUDE_STALE=0 hides the stale bucket (not relevant for
          # bot PRs). Set DRY_RUN=1 to log instead of post.
          POST_TARGET: mattermost
          DRY_RUN: 0
          INCLUDE_ONLY_BOTS: 1
          INCLUDE_STALE: 0
          INCLUDE_NEEDS_ATTENTION: 1
          INCLUDE_MERGED: 1
          MERGED_WINDOW: 14
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          REPOS_FILE: ${{ github.workspace }}/repos.yaml
        run: python scripts/pr_digest.py
