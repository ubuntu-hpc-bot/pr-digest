name: PR Digest — Mattermost (daily)

on:
  schedule:
    # 09:00 UTC, weekdays only. Edit this line to change the time or frequency.
    # Cron syntax: 'minute hour day-of-month month day-of-week'
    # Examples:
    #   '0 9 * * 1-5'    09:00 UTC Mon-Fri
    #   '30 14 * * 1-5'  14:30 UTC Mon-Fri
    #   '0 9 * * *'      09:00 UTC every day
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab for testing.

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run digest
        env:
          # POST_TARGET selects the post backend. mattermost = the
          # daily Mattermost incoming webhook. matrix = the weekly
          # Matrix room (handled by pr-digest-matrix.yml).
          # INCLUDE_* default to 1; the daily run shows all three
          # open buckets. Set DRY_RUN=1 to log instead of post.
          POST_TARGET: mattermost
          DRY_RUN: 0
          INCLUDE_STALE: 1
          INCLUDE_NEEDS_ATTENTION: 1
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          REPOS_FILE: ${{ github.workspace }}/repos.yaml
        run: python scripts/pr_digest.py
