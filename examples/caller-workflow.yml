# Reference caller workflow. This is what a workflow would look like if
# you wanted to TRIGGER the digest from a different repo (e.g. a "team
# automation" repo) instead of from the pr-digest repo itself.
#
# In the current setup, the pr-digest repo hosts its own schedule and
# this file is not used. Keep it as a reference for future moves.
#
# The example below sets every environment variable that
# scripts/pr_digest.py reads. Each line is annotated with whether
# it's required, optional, or target-specific. Delete or comment out
# anything that doesn't apply to your setup.

name: Trigger PR Digest

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 09:00 UTC, weekdays
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout pr-digest
        uses: actions/checkout@v4
        with:
          repository: <your-user>/pr-digest   # EDIT: set to your user/org
          path: pr-digest
          token: ${{ secrets.PR_DIGEST_PAT }} # needs read access to pr-digest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: pr-digest
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run digest
        working-directory: pr-digest
        env:
          # ---- Common (required) ----
          GH_TOKEN: ${{ secrets.GH_TOKEN }}      # fine-grained GitHub PAT

          # ---- Common (optional) ----
          # POST_TARGET: 'mattermost'           # default; 'matrix' is the other option
          # DRY_RUN: '0'                        # '1' = log digest instead of posting
          # INCLUDE_STALE: '1'                  # '0' hides the Stale/dead bucket
          # INCLUDE_NEEDS_ATTENTION: '1'        # '0' hides the Needs attention bucket
          # REPOS_FILE: ${{ github.workspace }}/repos.yaml   # default; rarely overridden

          # ---- Mattermost target (uncomment for POST_TARGET=mattermost) ----
          POST_TARGET: 'mattermost'
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}

          # ---- Matrix target (uncomment for POST_TARGET=matrix) ----
          # POST_TARGET: 'matrix'
          # MERGED_WINDOW: '7'                  # days of merged-PR history
          # MATRIX_HOMESERVER: ${{ secrets.MATRIX_HOMESERVER }}
          # MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          # MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}

        run: python scripts/pr_digest.py
