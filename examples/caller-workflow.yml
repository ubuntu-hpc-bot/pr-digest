# Reference caller workflow. This is what a workflow would look like if
# you wanted to TRIGGER the digest from a different repo (e.g. a "team
# automation" repo) instead of from the pr-digest repo itself.
#
# In the current setup, the pr-digest repo hosts its own schedule and
# this file is not used. Keep it as a reference for future moves.
name: Trigger PR Digest

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 09:00 UTC, weekdays
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout pr-digest
        uses: actions/checkout@v4
        with:
          repository: <your-user>/pr-digest   # EDIT: set to your user/org
          path: pr-digest
          token: ${{ secrets.PR_DIGEST_PAT }} # needs read access to pr-digest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: pr-digest
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run digest
        working-directory: pr-digest
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        run: python scripts/pr_digest.py
