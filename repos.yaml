# Repositories scanned by the daily PR digest.
# Add or remove entries as projects come and go. To temporarily
# disable a repo without deleting it, comment the line out with `#`.
#
# Format: <owner>/<repo>
#
# Activity thresholds control how PRs are bucketed in the digest.
# All values are in business hours (Mon-Fri, all hours).
thresholds:
    # PRs newer than this with very few comments go in "Needs attention".
    new_max_hours: 48
    # PRs with this many comments or fewer while still "new" get flagged.
    new_max_comments: 1
    # PRs with no activity for longer than this go in "Stale / dead".
    stale_min_hours: 240

repos:
    - canonical/apptainer-operator
    - canonical/charmed-hpc-benchmarks
    - canonical/charmed-hpc-docs
    - canonical/charmed-hpc-libs
    - canonical/charmed-hpc-terraform
    - canonical/filesystem-charms
    - canonical/hpc-specs
    - canonical/hpc-team
    - canonical/mysql-proxy-operator
    - canonical/ondemand-snap
    - canonical/ood-portal-generator
    - canonical/slurm-snap
    - canonical/slurm-charms
    - canonical/slurm-mail
    - canonical/slurm-snap
    - canonical/slurmutils
    - canonical/hpc-specs
    - canonical/sssd-operator
    - canonical/sysprober
